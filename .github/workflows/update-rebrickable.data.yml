name: Update Rebrickable Data

on:
  schedule:
    # Every Thursday at 21:00 UTC
    - cron: '0 21 * * 4'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Rebrickable CSVs
        working-directory: data
        run: |
          mkdir -p .
          FILES="themes colors part_categories parts sets inventories inventory_parts minifigs"
          for f in $FILES; do
            echo "Downloading $f.csv.gz..."
            curl -L -o "$f.csv.gz" \
              "https://cdn.rebrickable.com/media/downloads/$f.csv.gz"
            echo "$f: $(du -sh $f.csv.gz | cut -f1)"
          done

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet -- data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data
          git commit -m "chore: update Rebrickable data $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
